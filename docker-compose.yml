services:
  postgres:
    image: postgres:16
    container_name: sharpclaw-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - /home/khughes/sharpclaw/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required} -d ${POSTGRES_DB:?POSTGRES_DB is required}"]
      interval: 5s
      timeout: 5s
      retries: 10

  sharpclaw:
    build: .
    container_name: sharpclaw-api
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${SHARPCLAW_WORKSPACE:-./workspace}:/workspace
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SHARPCLAW_API_KEY=${SHARPCLAW_API_KEY}
      - GITHUB_COPILOT_TOKEN=${GITHUB_COPILOT_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=${POSTGRES_DB:?POSTGRES_DB is required};Username=${POSTGRES_USER:?POSTGRES_USER is required};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - SHARPCLAW_WORKSPACE=/workspace

  web:
    build: SharpClaw.Web
    container_name: sharpclaw-ui
    ports:
      - "8080:80"
    depends_on:
      - sharpclaw

  telegram:
    build:
      context: .
      dockerfile: SharpClaw.Telegram/Dockerfile
    container_name: sharpclaw-telegram
    restart: unless-stopped
    depends_on:
      sharpclaw:
        condition: service_healthy
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      - SHARPCLAW_API_KEY=${SHARPCLAW_API_KEY}
      - SHARPCLAW_API_URL=http://sharpclaw:8080
      - SHARPCLAW_DEFAULT_AGENT_ID=${SHARPCLAW_DEFAULT_AGENT_ID:-}
    profiles:
      - telegram
