server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests (including SSE streams) to the backend service.
    location /api/ {
        proxy_pass http://sharpclaw:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE / streaming support — disable buffering.
        # Long timeout to keep agent streams open for the full response duration.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # SPA fallback — serve index.html for any unmatched route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
